<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>택가이코드 IDE-lite TUI Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e1a;
    font-family: 'JetBrains Mono', 'Menlo', monospace;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-size: 13px;
    line-height: 1.5;
  }

  /* === MAIN LAYOUT === */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* === FILE TREE === */
  .file-tree {
    width: 260px;
    min-width: 260px;
    border-right: 1px solid #1e293b;
    display: flex;
    flex-direction: column;
    background: #0c1021;
  }

  .file-tree-header {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #1e293b;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .file-tree-header .hint {
    font-size: 10px;
    color: #475569;
    text-transform: none;
    letter-spacing: 0;
  }

  .file-tree-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .tree-item {
    padding: 3px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    font-size: 12.5px;
    color: #94a3b8;
    transition: background 0.1s;
  }

  .tree-item:hover { background: #1e293b; }

  .tree-item.selected {
    background: #1e3a5f;
    color: #e2e8f0;
  }

  .tree-item.dir { color: #60a5fa; }
  .tree-item .icon { width: 16px; text-align: center; flex-shrink: 0; }
  .tree-item .git-badge {
    margin-left: auto;
    font-size: 10px;
    font-weight: 700;
    padding: 0 4px;
    border-radius: 2px;
  }
  .git-m { color: #fbbf24; }
  .git-a { color: #34d399; }
  .git-u { color: #f87171; }

  .tree-indent { display: inline-block; width: 16px; }

  /* === RIGHT PANEL === */
  .right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* === EDITOR === */
  .editor-panel {
    flex: 6;
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid #1e293b;
    min-height: 0;
  }

  .editor-tab-bar {
    display: flex;
    background: #0c1021;
    border-bottom: 1px solid #1e293b;
    min-height: 32px;
    align-items: stretch;
  }

  .editor-tab {
    padding: 6px 16px;
    font-size: 12px;
    color: #64748b;
    border-right: 1px solid #1e293b;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .editor-tab.active {
    color: #e2e8f0;
    background: #0f172a;
    border-bottom: 2px solid #60a5fa;
  }

  .editor-tab .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #fbbf24;
  }

  .editor-tab .close {
    font-size: 14px;
    color: #475569;
    margin-left: 8px;
  }

  .editor-content {
    flex: 1;
    overflow: auto;
    padding: 0;
    background: #0f172a;
    display: flex;
  }

  .line-numbers {
    padding: 12px 0;
    text-align: right;
    color: #334155;
    font-size: 12px;
    line-height: 1.65;
    user-select: none;
    min-width: 48px;
    padding-right: 12px;
    border-right: 1px solid #1e293b;
    background: #0c1021;
  }

  .code-area {
    flex: 1;
    padding: 12px 16px;
    font-size: 12.5px;
    line-height: 1.65;
    overflow-x: auto;
    white-space: pre;
  }

  /* Syntax colors */
  .kw { color: #c084fc; }      /* keyword: purple */
  .fn { color: #60a5fa; }      /* function: blue */
  .str { color: #34d399; }     /* string: green */
  .cmt { color: #475569; font-style: italic; }  /* comment: gray */
  .typ { color: #38bdf8; }     /* type: sky blue */
  .num { color: #fbbf24; }     /* number: amber */
  .op { color: #94a3b8; }      /* operator: gray */
  .pkg { color: #fb923c; }     /* package/import: orange */
  .cur-line { background: #1e293b44; display: block; }

  /* === CHAT PANEL === */
  .chat-panel {
    flex: 4;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: #0f172a;
  }

  .chat-header {
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid #1e293b;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 100%;
  }

  .msg-user {
    border-left: 3px solid #38bdf8;
    padding: 8px 12px;
    background: #38bdf808;
    border-radius: 0 6px 6px 0;
  }

  .msg-user .msg-label {
    color: #38bdf8;
    font-weight: 700;
    font-size: 11px;
    margin-bottom: 4px;
  }

  .msg-assistant {
    border-left: 3px solid #34d399;
    padding: 8px 12px;
    background: #34d39908;
    border-radius: 0 6px 6px 0;
  }

  .msg-assistant .msg-label {
    color: #34d399;
    font-weight: 700;
    font-size: 11px;
    margin-bottom: 4px;
  }

  .msg-tool {
    padding: 4px 12px;
    font-size: 11.5px;
    color: #fbbf24;
    opacity: 0.8;
  }

  .msg-content {
    color: #cbd5e1;
    font-size: 12.5px;
    line-height: 1.6;
  }

  .msg-content code {
    background: #1e293b;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
    color: #f0abfc;
  }

  .msg-content .code-block {
    display: block;
    background: #0c1021;
    border: 1px solid #1e293b;
    border-radius: 6px;
    padding: 10px 14px;
    margin: 8px 0;
    font-size: 12px;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre;
  }

  .chat-input-area {
    padding: 8px 12px;
    border-top: 1px solid #1e293b;
  }

  .chat-input-box {
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s;
  }

  .chat-input-box:focus-within {
    border-color: #60a5fa;
  }

  .chat-input-box .prompt-icon {
    color: #60a5fa;
    font-weight: 700;
  }

  .chat-input {
    flex: 1;
    background: none;
    border: none;
    color: #e2e8f0;
    font-family: inherit;
    font-size: 12.5px;
    outline: none;
  }

  .chat-input::placeholder { color: #475569; }

  .chat-input-hint {
    font-size: 10px;
    color: #475569;
    padding: 4px 12px 2px;
  }

  /* === STATUS BAR === */
  .status-bar {
    background: #1e293b;
    padding: 4px 14px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: #64748b;
    min-height: 28px;
  }

  .status-item { display: flex; align-items: center; gap: 4px; }
  .status-git { color: #34d399; }
  .status-git.dirty { color: #fbbf24; }
  .status-model { color: #fbbf24; font-weight: 600; }
  .status-tokens { color: #34d399; }
  .status-cwd { color: #94a3b8; }
  .status-sep { color: #334155; }
  .status-right { margin-left: auto; display: flex; gap: 12px; }
  .status-key {
    background: #0f172a;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    color: #94a3b8;
  }

  /* === FOCUS INDICATORS === */
  .panel-focused { box-shadow: inset 0 0 0 1px #60a5fa40; }

  /* === STREAMING ANIMATION === */
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  .cursor-blink {
    display: inline-block;
    width: 7px;
    height: 14px;
    background: #60a5fa;
    animation: blink 1s infinite;
    vertical-align: middle;
    margin-left: 1px;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .streaming-dot {
    color: #34d399;
    animation: pulse-dot 1.5s infinite;
    font-weight: 700;
  }

  /* === SCROLLBAR === */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #475569; }

  /* === INTERACTIVE STATE TABS === */
  .state-tabs {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: #0a0e1a;
    border-bottom: 1px solid #1e293b;
  }

  .state-tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    color: #64748b;
    background: #0f172a;
    border: 1px solid #1e293b;
    font-family: inherit;
    transition: all 0.2s;
  }

  .state-tab:hover { border-color: #334155; color: #94a3b8; }
  .state-tab.active {
    background: #1e3a5f;
    border-color: #60a5fa;
    color: #e2e8f0;
  }

  /* === DIFF VIEW === */
  .diff-add { color: #34d399; background: #34d39910; }
  .diff-del { color: #f87171; background: #f8717110; }
  .diff-hunk { color: #60a5fa; }
</style>
</head>
<body>

<!-- State Tabs (interactive prototype control) -->
<div class="state-tabs">
  <button class="state-tab active" onclick="showState('normal')">Normal View</button>
  <button class="state-tab" onclick="showState('editing')">Editing Mode</button>

</div>

function renderTree(items, depth = 0) {
  let html = '';
  for (const item of items) {
    const indent = '<span class="tree-indent"></span>'.repeat(depth);
    const isDir = item.isDir;
    const icon = isDir ? (item.expanded ? '&#9660;' : '&#9654;') : '&#9643;';
    const cls = [
      'tree-item',
      isDir ? 'dir' : '',
      item.selected ? 'selected' : ''
    ].filter(Boolean).join(' ');

    let gitBadge = '';
    if (item.git === 'M') gitBadge = '<span class="git-badge git-m">M</span>';
    else if (item.git === 'A') gitBadge = '<span class="git-badge git-a">A</span>';
    else if (item.git === '?') gitBadge = '<span class="git-badge git-u">?</span>';

    html += `<div class="${cls}">${indent}<span class="icon">${icon}</span>${item.name}${gitBadge}</div>`;

    if (isDir && item.expanded && item.children) {
      html += renderTree(item.children, depth + 1);
    }
  }
  return html;
}

// === STATE MANAGEMENT ===
let currentState = 'normal';

function showState(state) {
  currentState = state;
  document.querySelectorAll('.state-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  const codeArea = document.getElementById('codeArea');
  const lineNumbers = document.getElementById('lineNumbers');
  const chatMessages = document.getElementById('chatMessages');
  const tabDot = document.getElementById('tabDot');
  const tabName = document.getElementById('tabName');
  const statusTokens = document.getElementById('statusTokens');

  switch(state) {
    case 'normal':
      codeArea.innerHTML = normalCode;
      chatMessages.innerHTML = normalMessages;
      tabDot.style.display = 'none';
      tabName.textContent = 'app.go';
      statusTokens.textContent = '1,247 tok';
      break;
    case 'editing':
      codeArea.innerHTML = editingCode;
      chatMessages.innerHTML = normalMessages;
      tabDot.style.display = 'inline-block';
      tabName.textContent = 'app.go [EDIT]';
      statusTokens.textContent = '1,247 tok';
      break;
    case 'streaming':
      codeArea.innerHTML = normalCode;
      chatMessages.innerHTML = streamingMessages;
      tabDot.style.display = 'none';
      tabName.textContent = 'editor.go';
      statusTokens.textContent = '2,891 tok';
      break;
    case 'diff':
      codeArea.innerHTML = diffCode;
      chatMessages.innerHTML = diffMessages;
      tabDot.style.display = 'none';
      tabName.textContent = 'app.go [DIFF]';
      statusTokens.textContent = '1,247 tok';
      break;
  }

  updateLineNumbers();
}

function updateLineNumbers() {
  const codeArea = document.getElementById('codeArea');
  const lineNumbers = document.getElementById('lineNumbers');
  const lines = codeArea.innerText.split('\n').length;
  let nums = '';
  for (let i = 1; i <= lines; i++) {
    nums += i + '\n';
  }
  lineNumbers.textContent = nums;
}

document.getElementById('chatInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = this.value.trim();
    if (!val) return;
    const chatMessages = document.getElementById('chatMessages');
    chatMessages.innerHTML += `
      <div class="msg msg-user">
        <div class="msg-label">You</div>
        <div class="msg-content">${val}</div>
      </div>
      <div class="msg msg-assistant">
        <div class="msg-label">AI <span class="streaming-dot">\u25cf</span></div>
        <div class="msg-content">\ub124, \ud655\uc778\ud558\uaca0\uc2b5\ub2c8\ub2e4<span class="cursor-blink"></span></div>
      </div>`;
    chatMessages.scrollTop = chatMessages.scrollHeight;
    this.value = '';
  }
});

// Click on tree items
document.getElementById('fileTree').addEventListener('click', function(e) {
  const item = e.target.closest('.tree-item');
  if (!item) return;
  document.querySelectorAll('.tree-item.selected').forEach(i => i.classList.remove('selected'));
  item.classList.add('selected');
});
