<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TECHAI IDE</title>
    <style>
      body { margin: 0; background: #0a0a0c; color: #e4e4e7; font-family: 'Segoe UI', -apple-system, sans-serif; }
      #loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 24px; color: #ffffff; flex-direction: column; gap: 12px; }
    </style>
    <script>
    // Wails API shim — MUST run before any module scripts
    // Placed in <head> to guarantee execution before Vite's deferred module bundle
    if (!window.go) {
    window.go = { main: { App: {} } };
    var api = function(method, args) {
      return fetch('/api/' + method, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: args !== undefined ? JSON.stringify(args) : undefined
      }).then(function(r) { return r.text().then(function(t) { try{return JSON.parse(t)}catch(e){return t} }) });
    };
    var get = function(method, params) {
      var qs = params ? '?' + new URLSearchParams(params).toString() : '';
      return fetch('/api/' + method + qs).then(function(r) { return r.text().then(function(t) { try{return JSON.parse(t)}catch(e){return t} }) });
    };
    var A = window.go.main.App;
    A.ListFiles = function(a,b) { return get('listFiles',{path:a||'.'}); };
    A.ReadFile = function(a) { return get('readFile',{path:a}); };
    A.WriteFile = function(a,b) { return api('writeFile',{path:a,content:b}); };
    A.DeleteFile = function(a) { return api('deleteFile',{path:a}); };
    A.RenameFile = function(a,b) { return api('renameFile',{oldPath:a,newPath:b}); };
    A.SearchInFiles = function(a,b) { return get('search',{pattern:a,path:b||'.'}); };
    A.WalkProject = function() { return get('walkProject'); };
    A.GetCwd = function() { return get('getCwd'); };
    A.SetCwd = function(a) { return api('setCwd',{path:a}); };
    A.SendMessage = function(a) { fetch('/api/sendMessage',{method:'POST',headers:{'Content-Type':'text/plain'},body:a}); return Promise.resolve(); };
    A.ClearChat = function() { return api('clearChat'); };
    A.GetModel = function() { return get('getModel'); };
    A.GetSettings = function() { return get('getSettings'); };
    A.SaveSettings = function(a,b,c) { return api('saveSettings',{baseURL:a,apiKey:b,model:c}); };
    A.SetLanguage = function(a) { return api('setLanguage',{lang:a}); };
    A.GetGitInfo = function() { return get('gitInfo'); };
    A.GetGitGraph = function(n) { return get('gitGraph'); };
    A.GetGitBranches = function() { return get('gitBranches'); };
    A.GitCheckout = function(a) { return api('gitCheckout',{branch:a}); };
    A.GitCreateBranch = function(a) { return api('gitCreateBranch',{name:a}); };
    A.GitPull = function() { return api('gitPull'); };
    A.GitPush = function() { return api('gitPush'); };
    A.GitStage = function(a) { return api('gitStage',{path:a}); };
    A.GitCommit = function(a) { return api('gitCommit',{message:a}); };
    A.GitDiff = function() { return get('gitDiff'); };
    A.GitDiffFile = function(a) { return get('gitDiffFile',{path:a}); };
    A.StartTerminal = function() { return api('startTerminal'); };
    A.WriteTerminal = function(a) { return api('writeTerminal',a); };
    A.StopTerminal = function() { return api('stopTerminal'); };
    A.ResizeTerminal = function() { return Promise.resolve(); };
    A.GetAvailableShells = function() { return get('getShells'); };
    A.GetCurrentShell = function() { return get('getCurrentShell'); };
    A.SetShell = function(a) { return api('setShell',{shell:a}); };
    A.GetKnowledgePacks = function() { return get('knowledgePacks'); };
    A.ToggleKnowledgePack = function(a,b) { return api('toggleKnowledgePack',{id:a,enabled:b}); };
    A.GetRecentProjects = function() { return get('recentProjects'); };
    A.OpenFolder = function() {
      return new Promise(function(resolve) {
        if (window.electronAPI && window.electronAPI.onFolderOpened) {
          var resolved = false;
          var handler = function(dir) { if (!resolved) { resolved = true; resolve(dir); } };
          window.electronAPI.onFolderOpened(handler);
          // Timeout: if no response in 60s, resolve empty (user cancelled)
          setTimeout(function() { if (!resolved) { resolved = true; resolve(''); } }, 60000);
        } else {
          resolve('');
        }
      });
    };
    A.OpenInBrowser = function(a) { window.open(a,'_blank'); return Promise.resolve(); };
    A.StartLiveServer = function(a) { return api('startLiveServer',{dir:a}); };
    A.ExportChat = function() { return api('exportChat'); };
    A.SaveSession = function(a) { return api('saveSession',{title:a}); };
    A.ListSessions = function() { return get('listSessions'); };
    A.LoadSession = function(a) { return api('loadSession',{id:a}); };
    A.FileExists = function(a) { return get('fileExists',{path:a}); };
    A.GetSearchLimit = function() { return Promise.resolve(100); };
    A.SaveDroppedFile = function(a,b) { return api('writeFile',{path:a,content:b}); };
    A.GetChatHistory = function() { return get('chatHistory'); };
    A.GitLog = function(n) { return get('gitLog'); };
    A.GitUnstage = function(a) { return api('gitUnstage',{path:a}); };
    A.GetFileIcon = function() { return Promise.resolve('file'); };
    A.DeleteSession = function(a) { return api('deleteSession',{id:a}); };
  }
  // Wails runtime shim — EventsOn/EventsEmit via SSE when not in Wails
  if (!window.runtime) {
    var _sseCallbacks = {};
    var _sseCancelId = 0;
    window.runtime = {
      EventsOnMultiple: function(name, cb, max) {
        if (!_sseCallbacks[name]) _sseCallbacks[name] = [];
        var entry = { cb: cb, max: max, count: 0, id: ++_sseCancelId };
        _sseCallbacks[name].push(entry);
        return function() { _sseCallbacks[name] = _sseCallbacks[name].filter(function(e){return e.id!==entry.id}) };
      },
      EventsOff: function() {},
      EventsOffAll: function() {},
      EventsEmit: function(name) {
        var data = arguments.length > 1 ? arguments[1] : undefined;
        fetch('/api/emit', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name:name,data:data}) }).catch(function(){});
      },
      LogPrint: function(){}, LogTrace: function(){}, LogDebug: function(){},
      LogInfo: function(){}, LogWarning: function(){}, LogError: function(){}, LogFatal: function(){},
      WindowSetTitle: function(){}, WindowShow: function(){}, WindowHide: function(){},
      WindowCenter: function(){}, WindowToggleMaximise: function(){},
      WindowSetSize: function(){}, WindowGetSize: function(){ return {w:1440,h:900} },
    };
    // Connect SSE for server-push events (with auto-reconnect)
    function connectSSE() {
      try {
        var es = new EventSource('/api/events');
        var sseEvents = ['chat:chunk','chat:stream_start','chat:stream_done','chat:tool_start','chat:tool_done','chat:error','chat:cleared','file:changed','tree:refresh','term:output','preview:open'];
        var jsonEvents = { 'chat:tool_start': true, 'chat:tool_done': true };
        var noArgEvents = { 'chat:stream_start': true, 'chat:stream_done': true, 'chat:cleared': true, 'tree:refresh': true };
        sseEvents.forEach(function(name) {
          es.addEventListener(name, function(e) {
            try {
              (_sseCallbacks[name]||[]).forEach(function(x) {
                if (noArgEvents[name]) x.cb();
                else if (jsonEvents[name]) x.cb(JSON.parse(e.data));
                else x.cb(e.data);
              });
            } catch(err) {}
          });
        });
        es.onerror = function() {
          es.close();
          setTimeout(connectSSE, 2000); // Reconnect after 2s
        };
      } catch(err) { setTimeout(connectSSE, 2000); }
    }
    connectSSE();
  }
    </script>
</head>
<body>
<div id="root"><div id="loading">
  <div>TECHAI IDE</div>
  <div style="font-size:14px;color:#888">Loading...</div>
  <div id="debug-info" style="font-size:11px;color:#555"></div>
</div></div>
<script>
  // Debug info + error handling
  try { document.getElementById('debug-info').textContent = 'UA: ' + navigator.userAgent.slice(0, 80); } catch(e) {}
  window.onerror = function(msg, src, line) {
    var el = document.getElementById('loading');
    if (el) el.innerHTML = '<div style="color:red">Error: ' + msg + '</div><div style="font-size:11px">' + src + ':' + line + '</div>';
    // Also show in a fixed overlay that React can't remove
    var ov = document.createElement('div');
    ov.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:12px 20px;background:#1a0000;color:#f87171;font-size:12px;z-index:99999;border-bottom:1px solid #f87171';
    ov.textContent = 'JS Error: ' + msg;
    document.body.appendChild(ov);
  };
</script>
<script src="./src/main.tsx" type="module"></script>
<script>
  setTimeout(function() {
    var el = document.getElementById('loading');
    if (el) {
      el.innerHTML += '<div style="color:orange;font-size:14px;margin-top:20px">App failed to load after 5s</div>';
      el.innerHTML += '<div style="font-size:11px;color:#666">Check techai-ide-debug.log</div>';
    }
  }, 5000);
</script>
</body>
</html>
